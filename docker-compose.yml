version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anamnesic-saas
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - PAGBANK_CLIENT_ID=${PAGBANK_CLIENT_ID}
      - PAGBANK_CLIENT_SECRET=${PAGBANK_CLIENT_SECRET}
      - PAGBANK_PLANS_API=${PAGBANK_PLANS_API}
      - PAGBANK_SUBSCRIPTIONS_API=${PAGBANK_SUBSCRIPTIONS_API}
      - PAGBANK_WEBHOOK_KEY=${PAGBANK_WEBHOOK_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: anamnesic-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-anamnesic}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-anamnesic}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anamnesic}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: